services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - site-data:/app/.data
    environment:
      - NODE_ENV=production
      - DOMAIN=${DOMAIN:-localhost}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - app

volumes:
  site-data:
  caddy-data:
  caddy-config:
